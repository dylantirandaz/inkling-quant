evaluation:
  # These checked local fixtures exercise pipeline/evaluator contracts only. Use the separately
  # pinned TinyStories validation slice for representative public-model quality evidence.
  allow_partial: false
  suites:
    - type: perplexity
      dataset: local://fixtures/tiny-corpus
      revision: fixture-data-v1
      split: evaluation
      prompt_template: "{text}"
    - type: generation_regression
      dataset: local://fixtures/generation-prompts
      revision: fixture-data-v1
      split: evaluation
      prompt_template: "{text}"
      decode:
        max_new_tokens: 4
        do_sample: false
        temperature: 1.0
